baseURL = 'https://krusty.blog/'

# Metadata
languageCode = 'en-us'
theme = 'hugo-bearblog'
title = "Krusty's Blog | Personal thoughts about the digital world and travelling"
author = "Andrea Grillo"
copyright = "Copyright © 2026, Andrea Grillo."

# SEO
enableRobotsTXT = true

# Links
disableKinds = ["taxonomy"]
ignoreErrors = ["error-disable-taxonomy"]

[sitemap]
  changefreq = "weekly"
  priority = 0.7
  filename = "sitemap.xml"

[permalinks]
  posts = "/:slug/"
  tags = "/tags/:slug"

[params]
  title = "Krusty's blog | Andrea Grillo"
  description = "Personal blog by Andrea Grillo about software engineering, learning, travel notes, and practical reflections on work and life."
  favicon = "images/favicon.png"
  images = ["images/social-card.png"]

  enablePostNavigator = true

  # Cloudinary configuration
  [params.cloudinary]
    cloudName = "dvcwiysuv"
    defaultTransformations = "f_auto,q_auto"  # Auto format and quality

  # Social links
  [[params.socialLinks]]
    name = "GitHub"
    url = "https://github.com/Krusty93/personal-blog"
  
  [[params.socialLinks]]
    name = "LinkedIn"
    url = "https://linkedin.com/in/grillo-andrea"
  
  [[params.socialLinks]]
    name = "RSS"
    url = "/feed/"
  
  [[params.socialLinks]]
    name = "InfoQ"
    url = "https://www.infoq.com/profile/Andrea-Grillo/#articles"

# https://gohugo.io/configuration/markup/#highlight
[markup]
  [markup.highlight]
    style = 'tokyonight-storm'
    lineNos = true
    lineNumbersInTable = false
    codeFences = true

[params.giscus]
  repo = "krusty93/personal-blog"
  repoID = "R_kgDORA05qA"
  category = "Announcements"
  categoryID = "DIC_kwDORA05qM4C1Zuv"
  mapping = "url"
  strict = "0"
  reactionsEnabled = "1"
  emitMetadata = "1"
  inputPosition = "bottom"
  theme = "preferred_color_scheme"
  lang = "en"
  loading = "lazy"
  crossorigin = "anonymous"

[outputs]
  home = ['html', 'rss']
  section = ['html', 'rss']
  taxonomy = ['html']
  term = ['html']

[outputFormats]
  [outputFormats.RSS]
    mediatype = "application/rss"
    baseName = "feed"